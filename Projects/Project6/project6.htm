<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rent a Pet - Graphics</title>

<style type="text/css">
	#thumbs, #image {
		width: 900px;
		text-align: center;
		margin: 0 auto 0 auto;
		color: #000;
	}

	#thumbs {
		margin-top: 10px;
	}

	#thumbs img {
		border: solid 1px #000;
		margin: 5px;
	}

	#image {
		height: 500px;
	}

	.instructions {
		font-style: italic;
	}
	
	body {
	background-image: url("Images/2colback.jpg");
	background-repeat: repeat-y;
	background-position: center top;
	margin: 0;
}
</style>

<script type="text/javascript">
	var PrintButton1 = new Image();
	var PrintButton2 = new Image();
	var logo1 = new Image();
	var logo2 = new Image();

	if (document.images) {
		PrintButton1.src = "Images/print1.jpg";
		PrintButton2.src = "Images/print2.jpg";
		logo1.src = "Images/logo1.png";
		logo2.src = "Images/logo2.jpg";
	}

	var imgArray = new Array(
		'Image1Lg.jpg',
		'Image2Lg.jpg',
		'Image3Lg.jpg',
		'Image4Lg.jpg'
	);

	var titleArray = new Array(
		'Dog and Bird',
		'Cat',
		'Dog and Cat',
		'Pig'
	);

	var imgPath = "Images/fullsize/";

	function swapImage(imgID) {
		var theImage = document.getElementById('theImage');
		var textDiv = document.getElementById('bottomText');

		var newImg = imgArray[imgID];
		var textTitle = titleArray[imgID];

		theImage.src = imgPath + newImg;
		textDiv.innerHTML = textTitle;
	}

	function preloadImages() {
		for (var i = 0; i < imgArray.length; i++) {
			var tmpImg = new Image();
			tmpImg.src = imgPath + imgArray[i];
		}
	}
</script>
</head>

<body onload="preloadImages()">

<div align="center">

	<div>
		<a href="#"
		   onmouseover="document.PrintButton.src=PrintButton2.src;"
		   onmouseout="document.PrintButton.src=PrintButton1.src;">

			<img src="Images/print1.jpg" width="200" height="50"
			     name="PrintButton" alt="Print Button" style="border:none;" />
		</a>
	</div>

	<div id="logo">
		<a href="#"
		   onmouseover="document.logo.src=logo2.src;"
		   onmouseout="document.logo.src=logo1.src;">

			<img src="Images/logo1.png" width="133" height="126"
			     name="logo" alt="Logo" style="border:none;" />
		</a>
	</div>

	<br />
	<br />
	<br />
	<br />

	<div id="thumbs">
		<img src="Images/thumbnails/Image1Sm.jpg" alt="Dog and Bird" onmouseover="swapImage(0);" />
		<img src="Images/thumbnails/Image2Sm.jpg" alt="Cat" onmouseover="swapImage(1);" />
		<img src="Images/thumbnails/Image3Sm.jpg" alt="Dog and Cat" onmouseover="swapImage(2);" />
		<img src="Images/thumbnails/Image4Sm.jpg" alt="Pig" onmouseover="swapImage(3);" />
	</div>

	<div id="image">
		<img id="theImage" src="Images/fullsize/Image1Lg.jpg" alt="Dog and Bird" />
		<h3 id="bottomText">Dog and Bird</h3>
	</div>

	<br />
	<br />
	<br />
	<br />

</div>

<p>
	<a href="http://validator.w3.org/check?uri=referer">
		<img src="http://www.w3.org/Icons/valid-xhtml10"
		     alt="Valid XHTML 1.0 Transitional" height="31" width="88" />
	</a>
</p>

</body>
</html>
